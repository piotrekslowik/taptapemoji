<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tap Tap Emoji – Recognize emojis. Beat the record.</title>
<meta name="description" content="A browser game where you identify emojis against the clock. The faster you answer, the higher your multiplier. Free, no sign-up required.">

<!-- Open Graph / Facebook -->
<meta property="og:type"        content="website">
<meta property="og:title"       content="Tap Tap Emoji – Recognize emojis. Beat the record.">
<meta property="og:description" content="A browser game where you identify emojis against the clock. The faster you answer, the higher your multiplier. Free, no sign-up required.">
<meta property="og:image"       content="https://piotrekslowik.github.io/taptapemoji/fb_promo.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="628">
<meta property="og:image:alt"   content="Tap Tap Emoji – emoji browser game">
<meta property="og:locale"      content="en_US">

<!-- Twitter / X Card -->
<meta name="twitter:card"        content="summary_large_image">
<meta name="twitter:title"       content="Tap Tap Emoji – Recognize emojis. Beat the record.">
<meta name="twitter:description" content="Browser emoji game. Free, no sign-up.">
<meta name="twitter:image"       content="https://piotrekslowik.github.io/taptapemoji/fb_promo.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════
     PIXEL ARCADE — v0.4 (Variant C)
     Press Start 2P + VT323 · neon glow · scanlines
  ═══════════════════════════════════════════════ */
  :root {
    --bg:      #050810;
    --panel:   rgba(15,20,40,.75);
    --border:  #2a2f4a;
    --accent:  #FFEE00;
    --correct: #00E676;
    --wrong:   #FF4081;
    --txt:     #e8eaf6;
    --gray:    #6272a4;
    --surface: #0f1428;
    --cyan:    #5DE7FF;
    --pink:    #FF4081;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; touch-action: manipulation; user-select: none; }
  body { font-family: 'VT323', monospace; color: var(--txt); }

  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 4px),
      radial-gradient(ellipse 100% 80% at 50% 0%, #1a2148 0%, #0a0e1a 60%, #050810 100%);
  }
  .screen.hidden { display: none; }

  /* ── BUTTONS ── */
  .btn {
    background: var(--accent); color: #050810;
    font-family: 'Press Start 2P', monospace; font-size: clamp(9px, 2.5vw, 12px);
    text-transform: uppercase; border: none; padding: 16px 24px;
    cursor: pointer; width: 100%; max-width: 320px;
    box-shadow: 4px 4px 0 var(--pink);
  }
  .btn:active { opacity: .85; transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--pink); }
  .btn.outline {
    background: transparent; border: 3px solid var(--cyan); color: var(--cyan);
    margin-top: 10px; font-family: 'Press Start 2P', monospace; font-size: clamp(8px, 2.2vw, 11px);
    padding: 14px 24px; min-height: 44px; box-shadow: none;
  }
  .btn.ghost {
    background: transparent; border: 2px solid #2a2f4a; color: #4a5080;
    font-family: 'VT323', monospace; font-size: 16px; letter-spacing: 2px;
    padding: 7px 18px; width: auto; text-transform: uppercase; cursor: pointer; box-shadow: none;
  }

  /* ── TIER PILLS ── */
  .tier-legend { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; max-width: 320px; }
  .tier-pill { font-family: 'VT323', monospace; font-size: 18px; letter-spacing: 1px; padding: 2px 9px; border: 2px solid; }
  .tp5 { color: #FF6B6B; border-color: #FF6B6B; }
  .tp4 { color: #FFEE00; border-color: #FFEE00; }
  .tp3 { color: #00E676; border-color: #00E676; }
  .tp2 { color: #5DE7FF; border-color: #5DE7FF; }
  .tp1 { color: #CC77FF; border-color: #CC77FF; }
  .tp0 { color: #6272a4; border-color: #6272a4; }

  /* ── HOME ── */
  #intro { justify-content: flex-start; padding: 0; gap: 0; }
  .home-hdr {
    width: 100%; flex-shrink: 0; padding: 20px 20px 16px;
    border-bottom: 2px solid var(--border);
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }
  .home-tagline { font-family: 'VT323', monospace; font-size: 16px; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); margin-bottom: 8px; }
  .home-tte { display: flex; align-items: center; gap: 0; margin-bottom: 6px; }
  .home-tap {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(27px, 7.8vw, 41px);
    color: var(--accent); text-transform: uppercase;
    text-shadow: 0 0 12px rgba(255,238,0,.55), 3px 3px 0 var(--pink);
  }
  .home-dot { color: var(--border); margin: 0 12px; }
  .home-emoji-word {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(32px, 10.2vw, 50px);
    color: var(--accent); text-transform: uppercase; margin-bottom: 16px;
    text-shadow: 0 0 14px rgba(255,238,0,.55), 3px 3px 0 var(--pink);
    line-height: 1.5;
  }
  .home-deco { font-size: 36px; letter-spacing: 8px; }
  .home-modes-lbl { font-family: 'VT323', monospace; font-size: 20px; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); padding: 10px 18px 4px; flex-shrink: 0; }

  /* ══════════════════════════════════════════════
     GAME SCREEN
  ══════════════════════════════════════════════ */
  #game-iq { justify-content: flex-start; padding: 0 0 88px; }

  .g-score-wrap {
    width: 100%; display: flex; flex-direction: column;
    align-items: center; padding: 10px 18px 0; gap: 4px;
  }
  .g-score {
    font-family: 'VT323', monospace; font-size: 68px; line-height: 1;
    color: var(--accent); text-shadow: 0 0 16px rgba(255,238,0,.5);
  }
.g-lives { display: flex; gap: 4px; justify-content: flex-end; align-items: center; font-size: 26px; line-height: 1; }

  .g-meta { display: flex; justify-content: flex-start; align-items: center; padding: 6px 16px 0; width: 100%; gap: 7px; }
  .g-puzzle { font-family: 'VT323', monospace; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); }
  .g-tier-badge { font-family: 'VT323', monospace; font-size: 18px; letter-spacing: 1px; padding: 1px 7px; border: 2px solid; }

  .grid-wrap { display: flex; flex-direction: column; width: 100%; flex-shrink: 0; margin-top: auto; gap: 10px; }
  .g-action-bottom { display: flex; justify-content: center; padding: 12px 18px 24px; }
  .g-mult-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .g-mult-lbl { font-family: 'VT323', monospace; font-size: 16px; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); }
  .g-mult {
    font-family: 'VT323', monospace; font-size: 38px; color: var(--accent);
    background: rgba(255,238,0,.07); padding: 2px 16px;
    min-width: 80px; text-align: center;
    text-shadow: 0 0 8px rgba(255,238,0,.4);
  }

  /* ── SEGMENTED PIXEL TIMER (fixed bottom) ── */
  .timer-wrap {
    position: fixed; bottom: 64px; left: 0; right: 0; height: 14px;
    background: #0a0e1a; z-index: 10;
    display: flex; gap: 2px; padding: 2px;
  }
  .timer-seg { flex: 1; height: 100%; background: #1a2040; border-radius: 0; }
  .timer-seg.fill { background: var(--cyan); box-shadow: 0 0 6px rgba(93,231,255,.65); }
  .timer-seg.fill.warn { background: var(--pink); box-shadow: 0 0 6px rgba(255,64,129,.65); }

  .content-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 16px; width: 100%; min-height: 0; padding: 6px 0; }
  .pts-earned {
    font-family: 'VT323', monospace; font-size: clamp(2.2rem, 9vw, 2.8rem);
    color: var(--accent); line-height: 1; min-height: 2.8rem; text-align: center;
    transition: opacity .2s; text-shadow: 0 0 8px rgba(255,238,0,.45);
  }

  .name-area { width: 100%; padding: 0 20px; display: flex; align-items: center; justify-content: center; }
  #emoji-name { font-family: 'VT323', monospace; font-size: clamp(2.2rem, 8.5vw, 3rem); text-align: center; line-height: 1.35; white-space: nowrap; overflow: hidden; transition: opacity .12s; }
  #emoji-name .colon { color: var(--cyan); }
  #emoji-name .word  { color: var(--txt); }
  #emoji-name.blind-hidden .colon { color: var(--gray); }
  #emoji-name.blind-hidden .word  { color: var(--gray); vertical-align: middle; letter-spacing: 0.05em; }

  .grid-area { padding: 0 14px; display: flex; justify-content: center; flex-shrink: 0; }
  #emoji-grid { display: grid; gap: 8px; justify-content: center; }
  .emoji-cell {
    width: var(--cs, 128px); height: var(--cs, 128px);
    background: var(--surface); border: 3px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: var(--cfs, 56px); cursor: pointer; user-select: none;
    transition: border-color .1s, background .1s, transform .08s, box-shadow .1s;
    flex-shrink: 0; position: relative; touch-action: manipulation;
  }
  .emoji-cell:active  { transform: scale(.88); }
  .emoji-cell.correct { border-color: var(--correct); background: rgba(0,230,118,.12); box-shadow: 0 0 14px rgba(0,230,118,.45); }
  .emoji-cell.wrong   { border-color: var(--wrong);   background: rgba(255,64,129,.12); box-shadow: 0 0 14px rgba(255,64,129,.45); }
  .emoji-cell.reveal  { border-color: var(--correct); background: rgba(0,230,118,.06); box-shadow: 0 0 8px rgba(0,230,118,.25); }
  .emoji-cell.disabled{ pointer-events: none; opacity: 0.28; }
  /* odpowiedzi zawsze pełna widoczność, nawet gdy disabled */
  .emoji-cell.correct.disabled,
  .emoji-cell.wrong.disabled,
  .emoji-cell.reveal.disabled { opacity: 1; }
  .emoji-cell.correct::after { content:'✓'; position:absolute; top:3px; right:5px; font-family:'VT323',monospace; font-size:18px; color:var(--correct); line-height:1; }
  .emoji-cell.wrong::after   { content:'✗'; position:absolute; top:3px; right:5px; font-family:'VT323',monospace; font-size:18px; color:var(--wrong);   line-height:1; }

  /* ── ROUND BANNER ── */
  #banner { position: fixed; inset: 0; background: rgba(5,8,16,.97); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 100; }
  #banner.hidden { display: none; }
  .banner-label { font-family: 'VT323', monospace; font-size: 22px; letter-spacing: 4px; text-transform: uppercase; color: var(--gray); }
  #banner-title {
    font-family: 'Press Start 2P', monospace; font-size: clamp(16px, 5.5vw, 24px);
    color: var(--accent); line-height: 1.5; text-align: center;
    text-shadow: 0 0 14px rgba(255,238,0,.55), 3px 3px 0 var(--pink);
  }
  #banner-sub { font-family: 'VT323', monospace; font-size: 22px; color: var(--gray); }
  #banner-tier-wrap { margin-top: 4px; }
  #banner-tier { font-family: 'VT323', monospace; font-size: 22px; letter-spacing: 2px; padding: 5px 16px; border: 2px solid; }
  #banner-count {
    font-family: 'Press Start 2P', monospace; font-size: clamp(60px, 18vw, 96px);
    color: var(--cyan); line-height: 1; min-width: 1.2ch; text-align: center; margin-top: 8px;
    text-shadow: 0 0 24px rgba(93,231,255,.65);
  }
  @keyframes countPop { 0%{transform:scale(1.4);opacity:1} 70%{transform:scale(1.0);opacity:1} 100%{transform:scale(0.8);opacity:0} }
  .count-pop { animation: countPop .82s ease forwards; }

  /* ── FEEDBACK ── */
  #feedback { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 50; opacity: 0; font-family: 'VT323', monospace; font-size: 52px; transition: opacity .15s; }
  #feedback.show { opacity: 1; }

  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
  .shake { animation: shake .32s ease; }

  /* ── FOCUS VISIBLE ── */
  .btn:focus-visible,
  .btn.outline:focus-visible,
  .ms-back:focus-visible,
  .mode-card:focus-visible,
  .emoji-cell:focus-visible,
  .rev-choice:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }

  /* ══════════════════════════════════════════════
     MODE SELECT
  ══════════════════════════════════════════════ */
  .ms-hdr { width:100%; display:flex; align-items:center; justify-content:space-between; padding:12px 18px; flex-shrink:0; border-bottom:2px solid var(--border); }
  .ms-title { font-family:'Press Start 2P',monospace; font-size:12px; color:var(--accent); }
  .ms-back { background:transparent; border:none; color:var(--gray); font-size:26px; cursor:pointer; padding:4px 8px; min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center; }
  .ms-body { flex:1; width:100%; padding:10px 14px 14px; display:flex; flex-direction:column; gap:6px; overflow-y:auto; min-height:0; -webkit-overflow-scrolling:touch; }
  .mode-card {
    width:100%; background:var(--panel);
    border:3px solid var(--border);
    padding:11px 14px; cursor:pointer;
    display:flex; align-items:center; gap:12px;
    transition:border-color .12s, box-shadow .12s;
    box-shadow: 0 0 0 1px #050810 inset;
  }
  .mode-card:active { border-color:var(--cyan); box-shadow:0 0 0 1px #050810 inset, 0 0 18px rgba(93,231,255,.22); }
  .mode-card.locked { opacity:.38; pointer-events:none; }
  .mc-icon { font-size:28px; width:36px; text-align:center; flex-shrink:0; }
  .mc-body { flex:1; min-width:0; }
  .mc-name { font-family:'VT323',monospace; font-size:22px; letter-spacing:.5px; color:var(--txt); }
  .mc-desc { font-family:'VT323',monospace; font-size:17px; color:var(--gray); margin-top:1px; line-height:1.25; }
  .mc-streak { font-family:'VT323',monospace; font-size:18px; color:var(--accent); margin-top:2px; }
  .mc-badge { font-family:'VT323',monospace; font-size:16px; letter-spacing:1px; text-transform:uppercase; padding:2px 7px; border:2px solid; flex-shrink:0; white-space:nowrap; }
  .badge-new   { color:var(--correct); border-color:var(--correct); }
  .badge-today { color:var(--accent);  border-color:var(--accent); }
  .badge-done  { color:var(--gray);    border-color:var(--border); }

  /* ── MASTERY ROW ── */
  #mastery-row { display:none; width:100%; padding:4px 16px 0; }
  #mastery-info { font-family:'VT323',monospace; font-size:18px; letter-spacing:1px; color:var(--gray); text-transform:uppercase; }
  #mastery-info span { color:var(--accent); }

  /* ── REVERSE MODE ── */
  #rev-emoji-area { display:none; font-size:88px; text-align:center; line-height:1; padding:6px 0; flex-shrink:0; }
  #rev-choices { display:none; flex-direction:column; gap:8px; width:100%; padding:0 14px; }
  .rev-choice {
    background:var(--panel); border:3px solid var(--border);
    padding:12px 40px 12px 16px;
    font-family:'VT323',monospace; font-size:clamp(1.2rem, 4vw, 1.4rem);
    cursor:pointer; text-align:center;
    transition:border-color .1s, background .1s, box-shadow .1s;
    position:relative; touch-action:manipulation;
    min-height:44px; display:flex; align-items:center; justify-content:center;
  }
  .rev-choice .rc { color:var(--cyan); }
  .rev-choice:active { background:rgba(93,231,255,.08); border-color:var(--cyan); }
  .rev-choice.correct { border-color:var(--correct); background:rgba(0,230,118,.12); pointer-events:none; box-shadow:0 0 12px rgba(0,230,118,.35); }
  .rev-choice.wrong   { border-color:var(--wrong);   background:rgba(255,64,129,.12); pointer-events:none; box-shadow:0 0 12px rgba(255,64,129,.35); }
  .rev-choice.reveal  { border-color:var(--correct); background:rgba(0,230,118,.06); pointer-events:none; }
  .rev-choice.disabled{ pointer-events:none; opacity:.42; }
  .rev-choice.correct::after { content:'✓'; position:absolute; right:14px; font-family:'VT323',monospace; font-size:22px; color:var(--correct); }
  .rev-choice.wrong::after   { content:'✗'; position:absolute; right:14px; font-family:'VT323',monospace; font-size:22px; color:var(--wrong); }

  /* ── MODE TAG ── */
  #mode-tag { font-family:'VT323',monospace; font-size:18px; letter-spacing:2px; text-transform:uppercase; color:var(--gray); padding:1px 7px; border:2px solid var(--border); }

  /* ══════════════════════════════════════════════
     GAME OVER
  ══════════════════════════════════════════════ */
  #gameover { gap: 14px; padding: 32px 24px; text-align: center; }
  .go-score {
    font-family: 'VT323', monospace; font-size: clamp(4.5rem, 20vw, 7rem);
    color: var(--accent); letter-spacing: -2px; line-height: 1;
    text-shadow: 0 0 20px rgba(255,238,0,.5);
  }
  .go-label-top { font-family: 'Press Start 2P', monospace; font-size: clamp(8px, 2.2vw, 11px); letter-spacing: 2px; text-transform: uppercase; color: var(--pink); }
  #go-new-best {
    font-family: 'Press Start 2P', monospace; font-size: clamp(8px, 2.2vw, 10px);
    letter-spacing: 2px; color: var(--accent); text-transform: uppercase;
    height: 16px; transition: opacity .3s;
    animation: pxBlink 1s steps(2) infinite;
  }
  @keyframes pxBlink { 0%,100%{opacity:1} 50%{opacity:.4} }
  .go-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; width: 100%; max-width: 300px; }
  .go-stat { background: var(--panel); border: 2px solid var(--border); padding: 12px; }
  .go-stat .val { font-family: 'VT323', monospace; font-size: 38px; color: var(--txt); line-height: 1; }
  .go-stat .lbl { font-family: 'VT323', monospace; font-size: 17px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); margin-top: 2px; }
  #go-mode-tag { font-family:'VT323',monospace; font-size:20px; letter-spacing:2px; text-transform:uppercase; color:var(--gray); padding:3px 10px; border:2px solid var(--border); }
  #go-extra    { font-family:'VT323',monospace; font-size:20px; color:var(--accent); letter-spacing:1px; min-height:20px; }

  /* ══════════════════════════════════════════════
     HOW TO PLAY
  ══════════════════════════════════════════════ */
</style>
</head>
<body>

<!-- ═══ HOME (intro + mode select) ══════════════════ -->
<div id="intro" class="screen">
  <div class="home-hdr">
<div class="home-tte">
      <span class="home-tap">TAP</span><span class="home-dot">·</span><span class="home-tap">TAP</span>
    </div>
    <div class="home-emoji-word">EMOJI</div>
    <div class="home-deco">🔥 🎯 💎 🧠</div>
  </div>
  <div class="home-modes-lbl">CHOOSE MODE</div>
  <div class="ms-body" id="ms-cards"></div>
</div>

<!-- ═══ HOW TO PLAY ══════════════════════════════════ -->
<!-- ═══ GAME IQ ══════════════════════════════════════ -->
<div id="game-iq" class="screen hidden">
  <div class="g-score-wrap">
    <div class="g-score" id="score-display">0</div>
    <div class="g-lives" id="lives-display"></div>
  </div>
  <div class="g-meta">
    <div id="mode-tag" style="display:none"></div>
  </div>
  <div id="mastery-row"><div id="mastery-info">0 mastered</div></div>
  <div class="content-area">
    <div id="pts-earned" class="pts-earned"></div>
    <div class="grid-wrap">
      <div class="timer-wrap" id="timer-wrap"></div>
      <div class="name-area"><div id="emoji-name"></div></div>
      <div id="rev-emoji-area"></div>
      <div class="grid-area"><div id="emoji-grid"></div></div>
      <div id="rev-choices"></div>
      <div class="g-action-bottom"><div class="g-mult-wrap"><div class="g-mult-lbl">MULTIPLIER</div><div class="g-mult" id="mult-display">×5.0</div></div></div>
    </div>
  </div>
</div>

<!-- ═══ ROUND BANNER ════════════════════════════════ -->
<div id="banner" class="hidden">
  <div class="banner-label" id="banner-label">New Round</div>
  <div id="banner-title">ROUND 1</div>
  <div id="banner-sub">2 emoji · base 100 pts</div>
  <div id="banner-tier-wrap"><div id="banner-tier">POPULAR</div></div>
  <div id="banner-count">3</div>
</div>

<!-- ═══ GAME OVER ════════════════════════════════════ -->
<div id="gameover" class="screen hidden">
  <div id="go-mode-tag">CLASSIC</div>
  <div class="go-label-top">Final Score</div>
  <div class="go-score" id="go-score">0</div>
  <div id="go-new-best" style="display:none">★ NEW RECORD</div>
  <div id="go-extra"></div>
  <div class="go-stats">
    <div class="go-stat"><div class="val" id="go-s1">—</div><div class="lbl">Rounds</div></div>
    <div class="go-stat"><div class="val" id="go-s2">—</div><div class="lbl">Correct</div></div>
    <div class="go-stat"><div class="val" id="go-s3">—</div><div class="lbl">Best Streak</div></div>
    <div class="go-stat"><div class="val" id="go-s4">—</div><div class="lbl">Hardest</div></div>
  </div>
  <button class="btn" id="go-btn-restart" onclick="restartCurrentMode()">PLAY AGAIN</button>
  <button class="btn outline" onclick="showScreen('intro');renderModeSelect()">MENU</button>
</div>

function fmtPts(n) {
  return Number(n).toLocaleString('en-US').replace(/,/g, '');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id)?.classList.remove('hidden');
}

// ── Seeded RNG (LCG) ──
function seededRng(seed) {
  let s = seed >>> 0;
  return function() {
    s = Math.imul(1664525, s) + 1013904223 >>> 0;
    return s / 0x100000000;
  };
}
function seededShuffle(arr, rng) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Daily Challenge helpers ──
function todaySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}
function dailyKey()     { return `ttm_iq_daily_${todaySeed()}`; }
function isDailyPlayed(){ try { return !!localStorage.getItem(dailyKey()); } catch(e) { return false; } }
function markDailyPlayed(score) {
  try { localStorage.setItem(dailyKey(), score); } catch(e) {}
  updateDailyStreak();
}
function getDailyStreak() { try { return parseInt(localStorage.getItem('ttm_iq_dstreak') || '0'); } catch(e) { return 0; } }
function updateDailyStreak() {
  try {
    const lastKey = 'ttm_iq_dlast';
    const streakKey = 'ttm_iq_dstreak';
    const today = todaySeed();
    const last  = parseInt(localStorage.getItem(lastKey) || '0');
    const prev  = new Date(); prev.setDate(prev.getDate() - 1);
    const yest  = prev.getFullYear() * 10000 + (prev.getMonth()+1) * 100 + prev.getDate();
    let streak  = parseInt(localStorage.getItem(streakKey) || '0');
    if (last === yest) streak += 1;
    else if (last !== today) streak = 1;
    localStorage.setItem(streakKey, streak);
    localStorage.setItem(lastKey, today);
    return streak;
  } catch(e) { return 1; }
}
function buildDailySequence() {
  const rng = seededRng(todaySeed());
  const pool = POOL.filter(p => p.t >= 1 && p.t <= 5);
  return seededShuffle(pool, rng).slice(0, 15); // 3 rounds × 5 puzzles
}

// ── Mastery helpers ──
function getMastery()   { try { return JSON.parse(localStorage.getItem('ttm_iq_mastery') || '{}'); } catch(e) { return {}; } }
function saveMastery(m) { try { localStorage.setItem('ttm_iq_mastery', JSON.stringify(m)); } catch(e) {} }
function updateMastery(emoji, wasCorrect) {
  const m = getMastery();
  if (!m[emoji]) m[emoji] = { seen: 0, wrong: 0 };
  m[emoji].seen++;
  if (!wasCorrect) m[emoji].wrong++;
  saveMastery(m);
}
function masteryAccuracy(emoji) {
  const d = getMastery()[emoji];
  if (!d || d.seen === 0) return -1; // unseen
  return 1 - d.wrong / d.seen;
}
function masteredCount() {
  const m = getMastery();
  return Object.values(m).filter(d => d.seen >= 3 && (1 - d.wrong / d.seen) >= 0.8).length;
}
function getWeightedCorrect(pool) {
  const m = getMastery();
  const weights = pool.map(p => {
    const d = m[p.e];
    if (!d || d.seen === 0) return 3;            // unseen — medium priority
    const acc = 1 - d.wrong / d.seen;
    if (acc >= 0.8 && d.seen >= 3) return 0.3;  // mastered — rarely shown
    if (acc < 0.5)                 return 6;     // struggling — high priority
    return 2;                                    // learning — normal
  });
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) {
    r -= weights[i];
    if (r <= 0) return pool[i];
  }
  return pool[pool.length - 1];
}
function buildSprintPool() {
  const m = getMastery();
  const all = POOL.filter(p => p.t >= 1);
  const weak   = all.filter(p => { const d = m[p.e]; return d && d.seen > 0 && (1 - d.wrong/d.seen) < 0.8; });
  const unseen = all.filter(p => !m[p.e] || m[p.e].seen === 0);
  let result = [...weak, ...unseen];
  if (result.length < 9) result = [...result, ...POOL.filter(p => p.t === 1)];
  const seen = new Set();
  return result.filter(p => seen.has(p.e) ? false : (seen.add(p.e), true));
}

  { id:'mastery', icon:'🧠', name:'EMOJI MASTERY',   desc:'Learn systematically. Emoji you struggle with appear more often.' },
  { id:'blind',   icon:'🙈', name:'BLIND',           desc:'Shortcode hidden — tap an emoji to reveal it. Guess blind.' },
  { id:'notimer', icon:'♾️', name:'NO TIMER',        desc:'No timer, no stress — take your time. Flat points per correct answer.' },
  { id:'rewers',  icon:'🔄', name:'REVERSE',         desc:'Reversed! See the emoji — pick the matching shortcode from 4 options.' },
];
function renderModeSelect() {
  const dailyPlayed = isDailyPlayed();
  const streak      = getDailyStreak();
  const mastered    = masteredCount();
  const total       = POOL.filter(p => p.t > 0).length;
  const body = document.getElementById('ms-cards');
  body.innerHTML = MODE_DEFS.map(m => {
    let badge = '', extra = '', locked = false;
    const best = parseInt(localStorage.getItem(`ttm_iq_best_${m.id}`) || '0');
    if (m.id === 'daily') {
      if (dailyPlayed) {
        badge  = `<div class="mc-badge badge-done">DONE</div>`;
        locked = true;
      } else {
        badge = `<div class="mc-badge badge-today">TODAY</div>`;
      }
      if (streak > 1) extra = `<div class="mc-streak">🔥 ${streak} day streak</div>`;
      if (best > 0) extra += `<div class="mc-streak">★ best ${fmtPts(best)} pts</div>`;
    } else if (m.id === 'mastery' || m.id === 'sprint') {
      extra = `<div class="mc-streak">${mastered}/${total} mastered</div>`;
      if (best > 0) extra += `<div class="mc-streak">★ best ${fmtPts(best)} pts</div>`;
    } else if (m.id === 'rewers') {
      if (best > 0) extra = `<div class="mc-streak">★ best ${fmtPts(best)} pts</div>`;
      else badge = `<div class="mc-badge badge-new">NEW</div>`;
    } else {
      if (best > 0) extra = `<div class="mc-streak">★ best ${fmtPts(best)} pts</div>`;
    }
    return `<div class="mode-card${locked ? ' locked' : ''}" onclick="selectMode('${m.id}')">
      <div class="mc-icon">${m.icon}</div>
      <div class="mc-body">
        <div class="mc-name">${m.name}</div>
        <div class="mc-desc">${m.desc}</div>
        ${extra}
      </div>
      ${badge}
    </div>`;
  }).join('');
}

function showGameOver(data) {
  document.getElementById('go-score').textContent = fmtPts(data.score);
  const nb = document.getElementById('go-new-best');
  nb.style.display = data.isNewBest ? 'block' : 'none';

  document.getElementById('go-s1').textContent = data.rounds;
  document.getElementById('go-s2').textContent = data.correct;
  document.getElementById('go-s3').textContent = data.streak;
  const tierEl = document.getElementById('go-s4');
  tierEl.textContent = TIER_META[data.hardestTier].label;
  tierEl.style.color = TIER_META[data.hardestTier].color;

  showScreen('gameover');
}

// ══════════════════════════════════════════════════════
//  MODE — EMOJI IQ
// ══════════════════════════════════════════════════════
const TIMER_MS = 5000;
const PUZZLES_PER_ROUND = 5;

const TIER_META = {
  5: { label:'POPULAR', cls:'tp5', color:'#FF6B6B' },
  4: { label:'KNOWN',     cls:'tp4', color:'#FFD93D' },
  3: { label:'COMMON',    cls:'tp3', color:'#6BCB77' },
  2: { label:'RARE',   cls:'tp2', color:'#4D96FF' },
  1: { label:'NICHE',   cls:'tp1', color:'#C77DFF' },
  0: { label:'UNKNOWN',  cls:'tp0', color:'#B0BEC5' },
};

function gridSizeForRound(round) {
  if (round === 1) return 2; if (round === 2) return 3; if (round === 3) return 4;
  if (round <= 5) return 6;  if (round <= 7) return 8;  return 9;
}
function tierForRound(round) {
  if (round <= 3) return 5; if (round <= 6) return 4; if (round <= 9) return 3;
  if (round <= 12) return 2; return 1;
}

let G = {};
let rafId = null;

function resetState() {
  G = {
    mode: G.mode || 'classic',
    round: 1, puzzle: 1, score: 0, lives: 3,
    gridSize: gridSizeForRound(1),
    correct: 0, streak: 0, bestStreak: 0,
    hardestTier: 5, active: false, timerHandle: null, timerStart: 0,
    correctIdx: -1, correctItem: null,
    usedSets: { 1: new Set(), 2: new Set(), 3: new Set(), 4: new Set(), 5: new Set() },
    // daily
    dailySequence: null, dailyIdx: 0,
    // sprint
    sprintPool: null,
  };
}

function getPoolForTier(tier) {
  let pool = POOL.filter(p => p.t === tier);
  if (pool.length < G.gridSize) {
    const ext = POOL.filter(p => p.t > 0 && Math.abs(p.t - tier) <= 1);
    const map = new Map();
    for (const p of [...pool, ...ext]) map.set(p.e, p);
    pool = [...map.values()];
  }
  return pool;
}

function IQ_cols(n) {
  if (n <= 2) return 2; if (n === 3) return 3; if (n <= 4) return 2;
  if (n <= 6) return 3; if (n <= 8) return 4;  if (n <= 9) return 3; return 4;
}

function fitEmojiName() {
  const el = document.getElementById('emoji-name');
  el.style.fontSize = ''; // reset do wartości CSS
  const maxW = el.parentElement.clientWidth - 32;
  if (el.scrollWidth <= maxW) return;
  let size = parseFloat(getComputedStyle(el).fontSize);
  const minSize = 16;
  while (el.scrollWidth > maxW && size > minSize) {
    size -= 1;
    el.style.fontSize = size + 'px';
  }
}

function renderName(shortcode, hidden) {
  const el = document.getElementById('emoji-name');
  el.style.opacity = '0';
  setTimeout(() => {
    if (hidden) {
      const masked = shortcode.replace(/[^-_]/g, '*');
      el.innerHTML = `<span class="colon">:</span><span class="word">${masked}</span><span class="colon">:</span>`;
      el.classList.add('blind-hidden');
    } else {
      el.innerHTML = `<span class="colon">:</span><span class="word">${shortcode}</span><span class="colon">:</span>`;
      el.classList.remove('blind-hidden');
    }
    fitEmojiName();
    el.style.opacity = '1';
  }, 80);
}
function revealBlindName() {
  const el = document.getElementById('emoji-name');
  el.classList.remove('blind-hidden');
  el.innerHTML = `<span class="colon">:</span><span class="word">${G.correctItem.n}</span><span class="colon">:</span>`;
}

function applyTierStyle(tier) {
  const { color, label } = TIER_META[tier];
  const badge = document.getElementById('tier-badge');
  if (badge) { badge.textContent = `T${tier}`; badge.style.color = color; badge.style.borderColor = color; }
}

function selectMode(mode) {
  if (mode === 'daily' && isDailyPlayed()) return;
  startMode(mode);
}

function startMode(mode) {
  if (mode === 'daily' && isDailyPlayed()) { showScreen('intro'); renderModeSelect(); return; }
  G.mode = mode;
  resetState();
  G.mode = mode;
  cancelAnimationFrame(rafId);
  clearTimeout(G.timerHandle);

  // mode-specific init
  if (mode === 'daily')   { G.dailySequence = buildDailySequence(); G.dailyIdx = 0; }
  if (mode === 'notimer') { /* 3 lives, no timer */ }
  if (mode === 'sprint')  { G.sprintPool = buildSprintPool(); G.lives = 1; }

  // show/hide mode-specific UI
  const isRev = mode === 'rewers';
  document.querySelector('.name-area').style.display  = isRev ? 'none' : '';
  document.querySelector('.grid-area').style.display  = isRev ? 'none' : '';
  document.getElementById('rev-emoji-area').style.display = isRev ? 'block' : 'none';
  document.getElementById('rev-choices').style.display    = isRev ? 'flex'  : 'none';
  document.getElementById('timer-wrap').style.display = mode === 'notimer' ? 'none' : '';

  // mastery row
  const showMastery = (mode === 'mastery' || mode === 'sprint');
  document.getElementById('mastery-row').style.display = showMastery ? 'block' : 'none';

  // mode tag
  const tagEl = document.getElementById('mode-tag');
  const tagMap = { daily:'📅 DAILY', blind:'🙈 BLIND', notimer:'♾️ NO TIMER', sprint:'💪 SPRINT', rewers:'🔄 REVERSE', mastery:'🧠 MASTERY', classic:'' };
  tagEl.textContent = tagMap[mode] || '';
  tagEl.style.display = mode === 'classic' ? 'none' : 'inline-block';

  showScreen('game-iq');
  startRound('Let\'s go!');
}

// alias for gameover restart
function startIQ() { startMode('classic'); }
function restartCurrentMode() {
  const m = G.mode || 'classic';
  if (m === 'daily') { showScreen('intro'); renderModeSelect(); }
  else startMode(m);
}

function buildPuzzle() {
  const mode = G.mode || 'classic';
  const tier = tierForRound(G.round);
  let correct;

  // ── Pick the correct answer ──
  if (mode === 'daily') {
    correct = G.dailySequence[G.dailyIdx++];
  } else if (mode === 'sprint') {
    const pool = G.sprintPool.length >= 1 ? G.sprintPool : POOL.filter(p => p.t >= 1);
    const usedSet = G.usedSets[Math.min(tier, 5)] || new Set();
    let avail = pool.filter(p => !usedSet.has(p.e));
    if (avail.length === 0) { usedSet.clear(); avail = [...pool]; }
    correct = avail[Math.floor(Math.random() * avail.length)];
    usedSet.add(correct.e);
  } else if (mode === 'mastery') {
    const tierPool = getPoolForTier(tier);
    correct = getWeightedCorrect(tierPool);
  } else {
    const tierPool = getPoolForTier(tier);
    const usedSet  = G.usedSets[tier];
    let avail = tierPool.filter(p => !usedSet.has(p.e));
    if (avail.length === 0) { usedSet.clear(); avail = [...tierPool]; }
    correct = avail[Math.floor(Math.random() * avail.length)];
    usedSet.add(correct.e);
  }

  G.correctItem = correct;

  // ── Build distractors ──
  const distPool = mode === 'sprint'
    ? POOL.filter(p => p.t >= 1 && p.e !== correct.e)
    : getPoolForTier(tier).filter(p => p.e !== correct.e);

  // T0 distractors: only use T0 entries (after dedup, these have t:0)
  const t0Count       = G.gridSize >= 4 ? 2 : (G.gridSize >= 3 ? 1 : 0);
  const t0Distractors = shuffle(POOL.filter(p => p.t === 0 && p.e !== correct.e)).slice(0, t0Count);
  const regularCount  = G.gridSize - 1 - t0Count;
  const distractors   = shuffle(distPool).slice(0, regularCount);
  const items         = shuffle([correct, ...distractors, ...t0Distractors]);
  G.correctIdx        = items.indexOf(correct);

  // ── Update header UI ──
  document.getElementById('score-display').textContent  = fmtPts(G.score);
  const rd = document.getElementById('round-display'); if (rd) rd.textContent = G.round;
  const pd = document.getElementById('puzzle-display'); if (pd) pd.textContent = `Q ${G.puzzle} / ${PUZZLES_PER_ROUND}`;
  applyTierStyle(tier);
  IQ_updateLives();
  document.getElementById('pts-earned').textContent = '';

  if (mode === 'mastery' || mode === 'sprint') {
    const mc = masteredCount();
    const tot = POOL.filter(p => p.t > 0).length;
    document.getElementById('mastery-info').innerHTML = `<span>${mc}</span> / ${tot} mastered`;
  }

  // ── REVERSE MODE layout ──
  if (mode === 'rewers') {
    document.getElementById('rev-emoji-area').textContent = correct.e;
    // 4 shortcode choices
    const choices = shuffle([correct, ...shuffle(POOL.filter(p => p.e !== correct.e && p.t > 0)).slice(0, 3)]);
    G.revChoiceIdx = choices.indexOf(correct); // index of correct among choices
    const rc = document.getElementById('rev-choices');
    rc.innerHTML = '';
    choices.forEach((ch, idx) => {
      const btn = document.createElement('div');
      btn.className = 'rev-choice';
      btn.setAttribute('role', 'button');
      btn.setAttribute('tabindex', '0');
      btn.setAttribute('aria-label', `:${ch.n}:`);
      btn.innerHTML = `<span class="rc">:</span>${ch.n}<span class="rc">:</span>`;
      btn.addEventListener('pointerdown', () => { handleRevTap(idx); });
      btn.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleRevTap(idx); } });
      rc.appendChild(btn);
    });
    renderName('???');
    G.active = true;
    IQ_startTimer();
    return;
  }

  // ── CLASSIC/DAILY/MASTERY/SPRINT/BLIND/NOTIMER grid layout ──
  renderName(correct.n, mode === 'blind');

  const c     = IQ_cols(G.gridSize);
  const rows  = Math.ceil(G.gridSize / c);
  const vw    = Math.min(window.innerWidth, 520);
  const maxCs = Math.min(128, Math.floor((vw - 32 - (c - 1) * 8) / c));
  // 3×3 grid only: scale down 30% to save vertical space
  const scale = (rows === 3) ? 0.70 : 1.0;
  const cs    = Math.max(48, Math.round(maxCs * scale));
  const cfs   = Math.round(cs * 0.44);
  const grid  = document.getElementById('emoji-grid');
  grid.style.setProperty('--cs',  cs  + 'px');
  grid.style.setProperty('--cfs', cfs + 'px');
  grid.style.gridTemplateColumns = `repeat(${c}, ${cs}px)`;
  grid.innerHTML = '';
  items.forEach((item, idx) => {
    const cell = document.createElement('div');
    cell.className = 'emoji-cell';
    cell.setAttribute('role', 'button');
    cell.setAttribute('tabindex', '0');
    cell.setAttribute('aria-label', `Wybierz ${item.e}`);
    cell.textContent = item.e;
    cell.addEventListener('pointerdown', () => { handleTap(idx); });
    cell.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleTap(idx); } });
    grid.appendChild(cell);
  });

  G.active = true;
  if (mode === 'notimer') {
    document.getElementById('mult-display').textContent = '—';
  } else {
    IQ_startTimer();
  }
}

// ── Segmented pixel timer ──────────────────────────
const TIMER_SEGS = 12;

function renderTimerSegs(filledCount, warn) {
  const wrap = document.getElementById('timer-wrap');
  if (!wrap) return;
  // Init segments on first call
  if (wrap.children.length !== TIMER_SEGS) {
    wrap.innerHTML = Array.from({length: TIMER_SEGS}, () => '<div class="timer-seg"></div>').join('');
  }
  const segs = wrap.children;
  for (let i = 0; i < TIMER_SEGS; i++) {
    if (i < filledCount) {
      segs[i].className = warn ? 'timer-seg fill warn' : 'timer-seg fill';
    } else {
      segs[i].className = 'timer-seg';
    }
  }
}

function IQ_startTimer() {
  renderTimerSegs(TIMER_SEGS, false);

  G.timerStart  = performance.now();
  G.timerHandle = setTimeout(IQ_onTimeout, TIMER_MS);

  cancelAnimationFrame(rafId);
  function tick() {
    if (!G.active) return;
    const elapsed = performance.now() - G.timerStart;
    const rem = Math.max(0, (TIMER_MS - elapsed) / 1000);
    const pct = rem / (TIMER_MS / 1000);
    renderTimerSegs(Math.ceil(pct * TIMER_SEGS), pct < 0.25);
    document.getElementById('mult-display').textContent = `×${rem.toFixed(1)}`;
    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

function IQ_stopTimer() {
  clearTimeout(G.timerHandle);
  cancelAnimationFrame(rafId);
  const elapsed = performance.now() - G.timerStart;
  const remaining = Math.max(0, (TIMER_MS - elapsed) / 1000);
  const pct = remaining / (TIMER_MS / 1000);
  renderTimerSegs(Math.ceil(pct * TIMER_SEGS), pct < 0.25);
  return remaining;
}

function handleTap(idx) {
  if (!G.active) return;
  const mode = G.mode || 'classic';

  // Blind mode: reveal the name first, then process after a brief pause
  if (mode === 'blind') {
    revealBlindName();
    G.active = false;
    const remaining = IQ_stopTimer();
    const cells = document.querySelectorAll('.emoji-cell');
    cells.forEach(c => c.classList.add('disabled'));
    setTimeout(() => _processTap(idx, remaining, mode), 280);
    return;
  }

  G.active = false;
  const remaining = mode === 'notimer' ? 0 : IQ_stopTimer();
  const cells = document.querySelectorAll('.emoji-cell');
  cells.forEach(c => c.classList.add('disabled'));
  _processTap(idx, remaining, mode);
}

function _processTap(idx, remaining, mode) {
  const cells = document.querySelectorAll('.emoji-cell');
  const wasCorrect = idx === G.correctIdx;

  // mastery tracking
  if (mode === 'mastery' || mode === 'sprint') updateMastery(G.correctItem.e, wasCorrect);

  if (wasCorrect) {
    cells[idx].classList.add('correct');
    G.correct++;
    G.streak++;
    if (G.streak > G.bestStreak) G.bestStreak = G.streak;
    // scoring by mode
    let pts;
    if (mode === 'notimer') pts = G.round * 200;
    else if (mode === 'blind') pts = Math.round(G.round * 200 * (remaining / (TIMER_MS / 1000)));
    else pts = Math.round(G.round * 100 * remaining);
    G.score += pts;
    const sign = pts >= 0 ? '+' : '';
    document.getElementById('mult-display').textContent = sign + fmtPts(pts);
    const ptsEl = document.getElementById('pts-earned');
    ptsEl.style.color = 'var(--correct)';
    ptsEl.textContent = sign + fmtPts(pts);
  } else {
    cells[idx].classList.add('wrong');
    cells[G.correctIdx].classList.add('reveal');
    G.streak = 0;
    G.lives--;
    IQ_updateLives();
    document.getElementById('mult-display').textContent = '✕';
    const ptsEl = document.getElementById('pts-earned');
    ptsEl.style.color = 'var(--wrong)';
    ptsEl.textContent = '✕';
    IQ_shake();
  }
  document.getElementById('score-display').textContent = G.score;
  setTimeout(IQ_advance, 950);
}

function handleRevTap(idx) {
  if (!G.active) return;
  G.active = false;
  const remaining = IQ_stopTimer();
  const choices   = document.querySelectorAll('.rev-choice');
  choices.forEach(c => c.classList.add('disabled'));
  const wasCorrect = idx === G.revChoiceIdx;

  if (G.mode === 'mastery' || G.mode === 'sprint') updateMastery(G.correctItem.e, wasCorrect);

  if (wasCorrect) {
    choices[idx].classList.remove('disabled');
    choices[idx].classList.add('correct');
    G.correct++;
    G.streak++;
    if (G.streak > G.bestStreak) G.bestStreak = G.streak;
    const pts = Math.round(G.round * 100 * remaining);
    G.score += pts;
    document.getElementById('mult-display').textContent = '+' + fmtPts(pts);
    const ptsEl = document.getElementById('pts-earned');
    ptsEl.style.color = 'var(--correct)';
    ptsEl.textContent = '+' + fmtPts(pts);
  } else {
    choices[idx].classList.remove('disabled');
    choices[idx].classList.add('wrong');
    choices[G.revChoiceIdx].classList.remove('disabled');
    choices[G.revChoiceIdx].classList.add('reveal');
    G.streak = 0;
    G.lives--;
    IQ_updateLives();
    document.getElementById('mult-display').textContent = '✕';
    const ptsEl = document.getElementById('pts-earned');
    ptsEl.style.color = 'var(--wrong)';
    ptsEl.textContent = '✕';
    IQ_shake();
  }
  document.getElementById('score-display').textContent = G.score;
  setTimeout(IQ_advance, 950);
}

function IQ_onTimeout() {
  if (!G.active) return;
  G.active = false;
  cancelAnimationFrame(rafId);
  const mode = G.mode || 'classic';

  if (mode === 'mastery' || mode === 'sprint') updateMastery(G.correctItem.e, false);

  if (mode === 'rewers') {
    const choices = document.querySelectorAll('.rev-choice');
    choices.forEach(c => c.classList.add('disabled'));
    choices[G.revChoiceIdx]?.classList.add('reveal');
  } else {
    const cells = document.querySelectorAll('.emoji-cell');
    cells.forEach(c => c.classList.add('disabled'));
    cells[G.correctIdx]?.classList.add('reveal');
    if (mode === 'blind') revealBlindName();
  }

  G.streak = 0;
  G.lives--;
  IQ_updateLives();
  document.getElementById('mult-display').textContent = '⏱';
  const ptsElT = document.getElementById('pts-earned');
  ptsElT.style.color = 'var(--wrong)';
  ptsElT.textContent = '⏱';
  IQ_shake();
  setTimeout(IQ_advance, 950);
}

function IQ_advance() {
  if (G.lives <= 0) { IQ_gameOver(); return; }
  const mode = G.mode || 'classic';
  // daily ends after 15 puzzles (3 rounds × 5)
  if (mode === 'daily' && G.dailyIdx >= 15) { IQ_gameOver(); return; }

  if (G.puzzle >= PUZZLES_PER_ROUND) {
    if (mode === 'daily' && G.round >= 3) { IQ_gameOver(); return; }
    G.round++;
    G.puzzle   = 1;
    G.gridSize = gridSizeForRound(G.round);
    startRound('Round complete');
  } else {
    G.puzzle++;
    buildPuzzle();
  }
}

function startRound(labelText) {
  const mode = G.mode || 'classic';
  const tier = (mode === 'sprint') ? 1 : tierForRound(G.round);
  const meta = TIER_META[tier];
  if (tier < G.hardestTier) G.hardestTier = tier;

  document.getElementById('banner-label').textContent = labelText;
  document.getElementById('banner-title').textContent = `ROUND ${G.round}`;
  document.getElementById('banner-sub').textContent   = `${G.gridSize} emoji · base ${G.round * 100} pts`;
  const tierEl = document.getElementById('banner-tier');
  tierEl.textContent       = meta.label;
  tierEl.style.color       = meta.color;
  tierEl.style.borderColor = meta.color;

  const b       = document.getElementById('banner');
  const countEl = document.getElementById('banner-count');
  b.classList.remove('hidden');

  let n = 3;
  function showCount() {
    countEl.classList.remove('count-pop');
    countEl.textContent = n;
    void countEl.offsetWidth;
    countEl.classList.add('count-pop');
    if (n > 1) { n--; setTimeout(showCount, 850); }
    else { setTimeout(() => { b.classList.add('hidden'); buildPuzzle(); }, 700); }
  }
  showCount();
}

function IQ_updateLives() {
  const el = document.getElementById('lives-display');
  let s = '';
  for (let i = 0; i < 3; i++) {
    s += i < G.lives
      ? '<span style="color:#FF4081;text-shadow:0 0 8px rgba(255,64,129,.7);font-size:28px;line-height:1">♥</span>'
      : '<span style="color:#2a2f4a;font-size:28px;line-height:1">♥</span>';
  }
  el.innerHTML = s;
}

function IQ_shake() {
  const g = document.getElementById('game-iq');
  g.classList.add('shake');
  setTimeout(() => g.classList.remove('shake'), 350);
}

function IQ_gameOver() {
  cancelAnimationFrame(rafId);
  clearTimeout(G.timerHandle);
  document.getElementById('banner').classList.add('hidden');
  const mode = G.mode || 'classic';

  let isNewBest = false;
  const bestKey = `ttm_iq_best_${mode}`;
  try {
    const best = parseInt(localStorage.getItem(bestKey) || '0');
    if (G.score > best) { localStorage.setItem(bestKey, G.score); isNewBest = true; }
  } catch(e) {}

  // daily: save score + update streak
  if (mode === 'daily') markDailyPlayed(G.score);

  // mode tag on game-over
  const modeNames = { classic:'CLASSIC', daily:'DAILY', mastery:'MASTERY', blind:'BLIND', notimer:'NO TIMER', sprint:'SPRINT', rewers:'REVERSE' };
  document.getElementById('go-mode-tag').textContent = modeNames[mode] || mode.toUpperCase();

  // extra info line
  let extra = '';
  if (mode === 'daily') {
    const streak = getDailyStreak();
    extra = streak > 1 ? `🔥 ${streak} day streak` : '';
  } else if (mode === 'mastery' || mode === 'sprint') {
    const mc = masteredCount();
    extra = `🧠 ${mc} / ${POOL.filter(p=>p.t>0).length} mastered`;
  }
  document.getElementById('go-extra').textContent = extra;

  // restart button: daily → go to menu
  const btn = document.getElementById('go-btn-restart');
  if (mode === 'daily') {
    btn.textContent = 'BACK TO MENU';
  } else {
    btn.textContent = 'PLAY AGAIN';
  }

  showGameOver({
    score: G.score,
    rounds: G.round,
    correct: G.correct,
    streak: G.bestStreak,
    hardestTier: G.hardestTier,
    isNewBest,
  });
}

// ══════════════════════════════════════════════════════
//  CHEAT HELPER (test)
// ══════════════════════════════════════════════════════
function cheatShow() {
  const modal = document.getElementById('cheat-modal');
  const content = document.getElementById('cheat-content');
  const screen = document.querySelector('.screen:not(.hidden)');
  const id = screen?.id;

  if (id === 'game-iq' && G.correctItem) {
    const isRev = G.mode === 'rewers';
    content.innerHTML = `
      <div style="font-size:48px;margin-bottom:8px">${G.correctItem.e}</div>
      <div style="font-size:13px;font-family:'Courier New',monospace;color:var(--accent)">:${G.correctItem.n}:</div>
      <div style="font-size:11px;color:#555;margin-top:6px">T${G.correctItem.t}${isRev ? ' · pick the correct shortcode' : ''}</div>`;
  } else {
    content.innerHTML = '<div style="color:#555;font-size:12px">No active game</div>';
  }
  modal.style.display = 'flex';
}
function cheatHide() {
  document.getElementById('cheat-modal').style.display = 'none';
}

document.addEventListener('dblclick', e => e.preventDefault());
renderModeSelect();
</script>
